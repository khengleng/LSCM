version: '3.8'

services:
  gateway:
    build: 
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lscm
      - REDIS_URL=redis://redis:6379
    depends_on:
      - orchestrator
      - db
      - redis

  portal:
    build:
      context: .
      dockerfile: ./services/portal/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway:3000
    depends_on:
      - gateway

  orchestrator:
    build:
      context: .
      dockerfile: ./services/orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lscm
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lscm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
